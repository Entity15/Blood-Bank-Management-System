<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BBMS Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>
<body>

  <header>
    <nav class="navbar">

      <div class="logo-section">
        <div class="logo-circle">
          <i class="fa-solid fa-droplet"></i>
        </div>

        <div class="logo-text">
          <h2>Blood Bank Management System</h2>
          <p>BBMS</p>
        </div>
      </div>

      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Hospitals</a></li>
        <li><a href="#">Doners</a></li>
        <li><a href="#">Patients</a></li>
        <li><a href="#">Requests</a></li>
        <li><a href="#">Donation</a></li>
        <li><a href="#">Contact Us</a></li>
      </ul>

    </nav>
  </header>

  <section class="hero">

     <img src="image.jpg" alt="Blood Donation" class="hero-image">



    <div class="overlay-content">

        <div class="hero-text">
            <h1>Blood Bank Management System</h1>
            <p>Donate Blood, Save Lives</p>
        </div>

        <div class="action-buttons">
            <button>Add Doner</button>
            <button>Add Patients</button>
            <button>Add Hospitals</button>
            <button>Create Requests</button>
            <button class="logout-btn">Log Out</button>
        </div>

    </div>


  </section>

</body>
</html>
