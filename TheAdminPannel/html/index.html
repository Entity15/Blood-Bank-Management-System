<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBMS Admin Portal</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r flex flex-col h-full">
            <div class="p-6 flex items-center gap-3">
                <div class="bg-red-600 p-2 rounded-lg flex items-center justify-center" style="background-color: var(--blood-red);">
                    <svg class="icon-svg text-white" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="font-bold text-gray-900 text-sm leading-tight">BBMS</h1>
                    <p class="text-xs text-gray-500">Admin Portal</p>
                </div>
            </div>

            <nav class="flex-1 px-4 py-4 space-y-1 overflow-y-auto" id="sidebar-nav">
                <button data-tab="dashboard" class="sidebar-item active px-3 py-2.5 rounded-lg flex items-center gap-3 font-medium text-sm text-gray-600 hover:bg-gray-50">
                    <svg class="icon-svg text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Dashboard
                </button>
                <button data-tab="donors" class="sidebar-item px-3 py-2.5 rounded-lg flex items-center gap-3 font-medium text-sm text-gray-600 hover:bg-gray-50">
                    <svg class="icon-svg text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Donors
                </button>
                <button data-tab="inventory" class="sidebar-item px-3 py-2.5 rounded-lg flex items-center gap-3 font-medium text-sm text-gray-600 hover:bg-gray-50">
                    <svg class="icon-svg text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Inventory
                </button>
                <button data-tab="requests" class="sidebar-item px-3 py-2.5 rounded-lg flex items-center gap-3 font-medium text-sm text-gray-600 hover:bg-gray-50">
                    <svg class="icon-svg text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                    Requests
                </button>
                <button data-tab="hospitals" class="sidebar-item px-3 py-2.5 rounded-lg flex items-center gap-3 font-medium text-sm text-gray-600 hover:bg-gray-50">
                    <svg class="icon-svg text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Hospitals
                </button>
                <button data-tab="staff" class="sidebar-item px-3 py-2.5 rounded-lg flex items-center gap-3 font-medium text-sm text-gray-600 hover:bg-gray-50">
                    <svg class="icon-svg text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    Staff
                </button>
            </nav>

            <div class="p-4 border-t">
                <button type="button" class="btn-secondary w-full justify-center">
                    Login
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="h-16 border-b bg-white flex items-center justify-between px-8 sticky top-0 z-10">
                <div class="flex-1" style="max-width: 28rem;">
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </span>
                        <input type="text" placeholder="Search donors, inventory or records..." class="w-full bg-gray-100 border-none rounded-lg pl-10 pr-4 py-2 text-sm">
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <button class="relative flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-500 p-2">
                        <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span class="absolute top-2 right-2 w-2 h-2 bg-red-600 rounded-full border-2 border-white"></span>
                    </button>
                    <button class="btn-primary">
                        <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        New Donation
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <main class="flex-1 overflow-y-auto p-8" id="main-content">
                <!-- Content will be injected here by main.js -->
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../JS/main.js"></script>
</body>
</html>
